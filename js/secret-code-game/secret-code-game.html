<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zameer</title>
</head>
<body>
    <h2>Welcome to Sectret Agent Code Game</h2>
    <input type="text" id="playerName" placeholder="Enter your name: ">
    <br><br>
    <input type="text" id="secretCode" placeholder="Enter your code: ">
    <button id="guessBtn">Guess</button>

    <p id="message"></p>
    <p id="attempts"></p>
    <p id="previousGuesses"></p>

    <script>
        let secretWord = "ali";
        let maxAttempts = 6;
        let attemptsLeft = maxAttempts;
        let guessedWords = [];

        let guessBtn = document.getElementById("guessBtn");
        let message = document.getElementById("message");
        let attempts = document.getElementById("attempts");
        let previousGuesses = document.getElementById("previousGuesses");

        attempts.textContent = "Attempts Left: " + attemptsLeft;

        guessBtn.addEventListener("click", function() {
            let secretCode = document.getElementById("secretCode");
            let guess = secretCode.value.trim().toLowerCase();

            if (guess === ""){
                message.textContent = "please enter something!";
                return;
            }
            guessedWords.push(guess);
            if (guess == secretWord){
                console.log("you guessed it right. congrats");
                guessBtn.disabled =true;
            } else {
                attemptsLeft--;
                message.textContent = "wrong guess! -_-";
            }
            attempts.textContent = "attempts left" + attemptsLeft;
            previousGuesses.textContent = "previous guesses: " + guessedWords.join(", ");

            if (attemptsLeft === 0 && guess !== secretWord) {
                message.textContent = "no attempts left, you loose hehe!-_-" + secretWord;
                guessBtn.disabled = true;
            }
            secretCode.value = "";
        });
    </script>
</body>
</html>
